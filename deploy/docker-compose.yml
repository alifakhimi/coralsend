# VPS Production: full stack with nginx
# Run: docker compose --env-file .env.local -f deploy/docker-compose.yml up -d
include:
  - docker-compose.base.yml
services:
  nginx:
    image: ${NGINX_IMAGE:-nginx:1.27.4}
    restart: unless-stopped
    volumes:
      - ./conf.d:/etc/nginx/conf.d:ro
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    depends_on:
      - web
      - server
